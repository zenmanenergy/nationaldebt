<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Federal Budget Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;--amber:#d29922;--blue:#58a6ff;
  --defense:#8b7355;--health:#1f6feb;--social:#8957e5;--edu:#e3b341;
  --infra:#3fb950;--sci:#79c0ff;--intl:#f78166;--gov:#6e7681;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:12px}
.app{display:grid;grid-template-rows:1fr auto auto;height:100vh;gap:4px;padding:4px}
.top-panels{display:grid;grid-template-columns:1fr 1fr;gap:4px;min-height:0;overflow:hidden}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column}
.panel-header{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.panel-title{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--blue)}
.panel-total{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px}
.panel-body{overflow-y:auto;flex:1;padding:4px 0}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-track{background:transparent}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Revenue rows */
.rev-row{padding:3px 8px;border-bottom:1px solid #1c2128;display:grid;grid-template-columns:140px 80px 1fr 70px 48px;align-items:center;gap:6px}
.rev-row:hover{background:#1c2128}
.rev-label{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.type-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;cursor:pointer;border:none;letter-spacing:.04em;transition:all .15s;white-space:nowrap}
.badge-flat{background:#21262d;color:var(--amber);border:1px solid var(--amber)}
.badge-prog{background:#1f3d2f;color:var(--green);border:1px solid var(--green)}
.badge-locked{background:#1c2128;color:var(--muted);border:1px solid var(--border);cursor:default}
.rev-slider{width:100%;accent-color:var(--blue);height:18px;cursor:pointer;touch-action:none}
.rev-amount{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;text-align:right;white-space:nowrap}
.rev-pct{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);text-align:right}

/* Spending */
.cat-header{padding:4px 8px;background:#1c2128;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none}
.cat-header:hover{background:#21262d}
.cat-toggle{font-size:9px;margin-left:auto}
.cat-total{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text)}
.spend-row{padding:3px 8px;border-bottom:1px solid #1c2128;display:grid;grid-template-columns:160px 1fr 65px 55px 20px;align-items:center;gap:5px}
.spend-row:hover{background:#1c2128}
.spend-label{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spend-slider{width:100%;height:18px;cursor:pointer;touch-action:none}
.spend-amount{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;text-align:right}
.spend-delta{font-family:'IBM Plex Mono',monospace;font-size:9px;text-align:right;white-space:nowrap}
.spend-job-icon{font-size:10px;text-align:center}
.delta-pos{color:var(--red)}
.delta-neg{color:var(--green)}
.delta-zero{color:var(--muted)}
.locked-row{opacity:.6}
.locked-row .spend-slider{cursor:not-allowed;opacity:.4}

/* Deficit bar */
.deficit-panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.deficit-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.deficit-main{text-align:center}
.deficit-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.deficit-number{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;line-height:1.1;transition:color .3s}
.deficit-number.surplus{color:var(--green)}
.deficit-number.deficit{color:var(--red)}
.deficit-change{font-family:'IBM Plex Mono',monospace;font-size:11px;margin-top:2px}
.bar-wrap{flex:1}
.bar-track{height:10px;background:#21262d;border-radius:5px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:5px;transition:width .3s,background .3s}
.deficit-breakdown{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);display:flex;gap:16px;justify-content:center;margin-top:4px}
.deficit-breakdown span{white-space:nowrap}
.breakdown-rev{color:var(--green)}
.breakdown-spend{color:var(--red)}
.breakdown-gap{color:var(--amber)}

/* Jobs panel */
.jobs-panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.jobs-header{padding:5px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.jobs-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:4px}
.student-card{background:#1c2128;border:1px solid var(--border);border-radius:5px;padding:5px 6px;position:relative;transition:all .3s;cursor:pointer}
.student-card:hover{border-color:var(--blue)}
.student-card.at-risk{border-color:var(--amber)!important;background:#1f1a10}
.student-card.job-lost{border-color:var(--red)!important;background:#1a1010;opacity:.75}
.card-status{position:absolute;top:3px;right:3px;font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:700;padding:1px 3px;border-radius:2px;text-transform:uppercase}
.status-ok{background:#1f3d2f;color:var(--green)}
.status-risk{background:#332200;color:var(--amber)}
.status-lost{background:#3d1a1a;color:var(--red)}
.card-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.2;padding-right:30px}
.card-income{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);margin-top:1px}
.card-tax{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--blue);margin-top:2px}
.card-rate{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.card-dep{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.2}

/* Tooltip */
.tooltip{position:fixed;background:#21262d;border:1px solid var(--border);border-radius:5px;padding:8px 10px;font-size:10px;max-width:220px;z-index:1000;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.5);line-height:1.4;display:none}
.tooltip.visible{display:block}

/* Reset button */
.reset-btn{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:3px 8px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:#21262d;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;transition:all .15s}
.reset-btn:hover{border-color:var(--blue);color:var(--blue)}

/* Modal popup */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center}
.modal.visible{display:flex}
.modal-content{background:var(--panel);border:1px solid var(--border);border-radius:8px;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.8)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--blue)}
.modal-close{font-size:28px;cursor:pointer;color:var(--muted);transition:color .2s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:16px;font-size:11px;color:var(--text);line-height:1.6}

/* Clickable row styling */
.rev-row.clickable{cursor:pointer;transition:background .2s}
.rev-row.clickable:hover{background:#21262d}
.spend-row.clickable{cursor:pointer;transition:background .2s}
.spend-row.clickable:hover{background:#21262d}

/* Category colors */
.cat-defense .spend-slider{accent-color:var(--defense)}
.cat-health .spend-slider{accent-color:var(--health)}
.cat-social .spend-slider{accent-color:var(--social)}
.cat-edu .spend-slider{accent-color:var(--edu)}
.cat-infra .spend-slider{accent-color:var(--infra)}
.cat-sci .spend-slider{accent-color:var(--sci)}
.cat-intl .spend-slider{accent-color:var(--intl)}
.cat-gov .spend-slider{accent-color:var(--gov)}

/* Collapsed categories */
.cat-rows{display:block}
.cat-rows.collapsed{display:none}

/* Job lost overlay */
.job-lost-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(26,16,16,.85);border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;color:var(--red);letter-spacing:.05em;pointer-events:none;display:none}
.student-card.job-lost .job-lost-overlay{display:flex}
</style>
</head>
<body>
<div class="app">

  <!-- TOP: Revenue + Spending -->
  <div class="top-panels">

    <!-- REVENUE PANEL -->
    <div class="panel" id="revenue-panel">
      <div class="panel-header">
        <span class="panel-title">Revenue</span>
        <span class="panel-total" id="rev-total-display" style="color:var(--green)">$4,900B</span>
        <button class="reset-btn" onclick="resetAll()">Reset All</button>
      </div>
      <div class="panel-body" id="revenue-body"></div>
    </div>

    <!-- SPENDING PANEL -->
    <div class="panel" id="spending-panel">
      <div class="panel-header">
        <span class="panel-title">Spending</span>
        <span class="panel-total" id="spend-total-display" style="color:var(--red)">$6,900B</span>
      </div>
      <div class="panel-body" id="spending-body"></div>
    </div>

  </div>

  <!-- DEFICIT BAR -->
  <div class="deficit-panel">
    <div class="deficit-grid">
      <div class="deficit-breakdown">
        <span class="breakdown-rev">Rev: <span id="d-rev">$4,900B</span></span>
        <span class="breakdown-spend">Spend: <span id="d-spend">$6,900B</span></span>
        <span class="breakdown-gap">Gap: <span id="d-gap">-$2,000B</span></span>
      </div>
      <div class="deficit-main">
        <div class="deficit-label">Deficit / Surplus</div>
        <div class="deficit-number deficit" id="deficit-number">-$2,000B</div>
        <div class="deficit-change" id="deficit-change" style="color:var(--muted)">Baseline</div>
        <div class="bar-wrap" style="margin-top:4px">
          <div class="bar-track">
            <div class="bar-fill" id="bar-fill" style="width:50%;background:var(--red)"></div>
          </div>
        </div>
      </div>
      <div style="text-align:right;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">
        <div>On-budget deficit</div>
        <div style="font-size:13px;color:var(--text)" id="baseline-deficit-display">-$1,134B</div>
        <div style="margin-top:4px">Jobs at risk: <span id="jobs-at-risk-count" style="color:var(--amber)">0</span></div>
        <div>Jobs lost: <span id="jobs-lost-count" style="color:var(--red)">0</span></div>
      </div>
    </div>
  </div>

  <!-- JOBS PANEL -->
  <div class="jobs-panel">
    <div class="jobs-header">
      <span class="panel-title">Student Cards — Tax &amp; Employment Status</span>
    </div>
    <div class="jobs-grid" id="jobs-grid"></div>
  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<!-- MODAL POPUP -->
<div class="modal" id="info-modal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <span class="modal-close" onclick="closeModal()">&times;</span>
    </div>
    <div class="modal-body">
      <div id="modal-description"></div>
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-weight:600;font-size:11px;color:var(--blue);text-transform:uppercase;margin-bottom:8px">Affected Stakeholders</div>
        <div id="modal-stakeholders" style="font-size:11px;color:var(--text);line-height:1.6"></div>
      </div>
    </div>
  </div>
</div>

<script>

// ─── CALCULATIONS ────────────────────────────────────────────────────────────

// Income tax using current state — brackets scaled by rateMultiplier, or flat rate if toggled
function calcIncomeTax(gross) {
  const m = state.revenue.individualIncomeTax.rateMultiplier;
  const taxable = Math.max(0, gross - STANDARD_DEDUCTION);
  let tax = 0;
  if (state.revenue.individualIncomeTax.type === 'flat') {
    // Flat rate: ~18% base scaled by multiplier
    tax = taxable * 0.18 * m;
  } else {
    for (const b of brackets2025) {
      if (taxable <= b.min) break;
      const amt = Math.min(taxable, b.max) - b.min;
      tax += amt * b.rate * m;
    }
  }
  return tax;
}

// Payroll taxes based on current SS and Medicare state
function calcPayrollTax(wages) {
  const ssR = state.revenue.socialSecurity;
  const medR = state.revenue.medicare;

  // SS: 6.2% employee share, cap at $184,500 unless toggled to progressive (removes cap)
  const ssRate = 0.062 * ssR.rateMultiplier;
  const ssCap = ssR.type === 'progressive' ? Infinity : 184500;
  const ssTax = Math.min(wages, ssCap) * ssRate;

  // Medicare: 1.45%, no cap, scaled by multiplier
  const medTax = wages * 0.0145 * medR.rateMultiplier;

  return ssTax + medTax;
}

// CG tax — uses ordinary brackets if toggled, otherwise CG rates (both scaled by income tax multiplier)
function calcCGTax(cgIncome) {
  if (state.cgAsOrdinary) return calcIncomeTax(cgIncome);
  const m = state.revenue.individualIncomeTax.rateMultiplier;
  let tax = 0;
  for (const b of cgRates) {
    if (cgIncome <= b.min) break;
    const amt = Math.min(cgIncome, b.max) - b.min;
    tax += amt * b.rate * m;
  }
  return tax;
}

// Full student tax: income tax + payroll + CG
function calcStudentTax(student) {
  const incomeTax = calcIncomeTax(student.income);
  const payroll = calcPayrollTax(student.income);
  const cgTax = calcCGTax(student.cgIncome);
  const total = incomeTax + payroll + cgTax;
  const totalIncome = student.income + student.cgIncome;
  const effRate = totalIncome > 0 ? (total / totalIncome) * 100 : 0;
  return { incomeTax, payroll, cgTax, total, effRate };
}

function calcTotalRevenue() {
  let total = 0;
  for (const [k, r] of Object.entries(state.revenue)) {
    // Skip socialSecurity and medicare — both off-budget (FICA taxes)
    if (k === 'socialSecurity' || k === 'medicare') continue;
    
    // Progressive multiplier applies when type is progressive
    let multiplier = 1.0;
    if (r.type === 'progressive' && progressiveMultipliers[k]) {
      multiplier = progressiveMultipliers[k];
    }
    // Flat tax multiplier applies when type is flat (only for items with special flat behavior)
    if (r.type === 'flat' && flatTaxMultipliers[k]) {
      multiplier = flatTaxMultipliers[k];
    }
    total += r.baseAmount * r.rateMultiplier * multiplier;
  }
  return total;
}

function calcTotalSpending() {
  let total = 0;
  for (const cat of Object.values(state.spending)) {
    for (const [k, item] of Object.entries(cat.items)) {
      // Skip Social Security AND Medicare items — both off-budget (FICA funded)
      if (k === 'ssRetirement' || k === 'ssDisability' || k === 'ssSurvivor' || 
          k === 'medicare') continue;
      total += item.amount;
    }
  }
  return total;
}

function calcDeficit() {
  return calcTotalRevenue() - calcTotalSpending();
}

function getSpendItem(key) {
  for (const cat of Object.values(state.spending)) {
    if (cat.items[key]) return cat.items[key];
  }
  return null;
}

function cutPct(key) {
  const item = getSpendItem(key);
  if (!item) return 0;
  return (item.baseline - item.amount) / item.baseline;
}

function checkJobStatus(student) {
  const k = student.depKey;
  if (!k) return 'ok';

  if (k === 'defenseOps') {
    const pct = cutPct('defenseOps');
    if (pct > 0.20) return 'lost';
    if (pct > 0.10) return 'risk';
  }
  if (k === 'medicaid') {
    const pct = cutPct('medicaid');
    if (student.sector === 'govt') { // caseworker
      if (pct > 0.15) return 'lost';
      if (pct > 0.08) return 'risk';
    } else { // uses it
      if (pct > 0.20) return 'risk'; // loses coverage, not job
    }
  }
  if (k === 'sciEnv') {
    const pct = cutPct('sciEPA');
    if (pct > 0.25) return 'lost';
    if (pct > 0.12) return 'risk';
  }
  if (k === 'nurse') {
    const medPct = cutPct('medicare');
    const medcaidPct = cutPct('medicaid');
    const combined = (medPct + medcaidPct) / 2;
    if (combined > 0.30) return 'lost';
    if (combined > 0.15) return 'risk';
  }
  if (k === 'education') {
    const pct = cutPct('eduK12');
    if (pct > 0.40) return 'lost';
    if (pct > 0.20) return 'risk';
  }
  return 'ok';
}

function indirectTooltip(student, status) {
  if (status === 'ok') return null;
  if (student.depKey === 'defenseOps') {
    const item = getSpendItem('defenseOps');
    const cutB = item.baseline - item.amount;
    const jobs = Math.round(cutB * 3500);
    return `Defense ops cut by $${cutB}B → est. ${jobs.toLocaleString()} indirect civilian jobs lost in surrounding communities (restaurants, shops, contractors).`;
  }
  if (student.depKey === 'sciEnv') {
    return `Park closures ripple: local tourism businesses, outfitters, and hospitality near federal lands lose significant revenue.`;
  }
  return null;
}

function formatB(n) {
  if (Math.abs(n) >= 1000) return `$${(n/1000).toFixed(1)}T`;
  return `$${Math.round(n)}B`;
}

function fmtMoney(n) {
  if (n >= 1e9)  return `$${(n/1e9).toFixed(2)}B`;
  if (n >= 1e6)  return `$${(n/1e6).toFixed(1)}M`;
  return `$${Math.round(n).toLocaleString()}`;
}

function renderJobs() {
  const grid = document.getElementById('jobs-grid');
  grid.innerHTML = '';
  let atRisk = 0, lost = 0;

  for (const s of students) {
    const status = checkJobStatus(s);
    if (status === 'risk') atRisk++;
    if (status === 'lost') lost++;

    const {incomeTax, payroll, cgTax, total, effRate} = calcStudentTax(s);
    const totalIncome = s.income + s.cgIncome;

    const card = document.createElement('div');
    card.className = `student-card ${status === 'risk' ? 'at-risk' : status === 'lost' ? 'job-lost' : ''}`;
    card.dataset.studentId = s.id;

    const statusLabel = status === 'ok' ? 'OK' : status === 'risk' ? 'AT RISK' : 'JOB LOST';
    const statusClass  = status === 'ok' ? 'status-ok' : status === 'risk' ? 'status-risk' : 'status-lost';

    card.innerHTML = `
      <span class="card-status ${statusClass}">${statusLabel}</span>
      <div class="card-name">${s.name}</div>
      <div class="card-income">${fmtMoney(totalIncome)}</div>
      <div class="card-tax">${fmtMoney(total)}</div>
      <div class="card-rate">${effRate.toFixed(1)}% eff. rate</div>
      <div class="card-dep">${s.dependsOn}</div>
      <div class="job-lost-overlay">JOB LOST</div>
    `;

    // Hover tooltip: tax breakdown + optional indirect job loss note
    const indirect = indirectTooltip(s, status);
    const itLabel = state.revenue.individualIncomeTax.type === 'flat' ? 'Income tax (flat)' : 'Income tax (prog)';
    const ssLabel = state.revenue.socialSecurity.type === 'progressive' ? 'SS payroll (no cap)' : 'SS payroll (6.2%)';
    const medRate = (0.0145 * state.revenue.medicare.rateMultiplier * 100).toFixed(2);
    let tipLines = [
      `${itLabel}: ${fmtMoney(incomeTax)}`,
      `${ssLabel}: ${fmtMoney(payroll - (s.income * 0.0145 * state.revenue.medicare.rateMultiplier))} + Medicare ${medRate}%: ${fmtMoney(s.income * 0.0145 * state.revenue.medicare.rateMultiplier)}`,
    ];
    if (s.cgIncome > 0) tipLines.push(`Capital gains tax: ${fmtMoney(cgTax)} (${state.cgAsOrdinary?'ordinary rates':'CG rates'})`);
    tipLines.push(`Total: ${fmtMoney(total)} | Eff. rate: ${effRate.toFixed(1)}%`);
    if (indirect) tipLines.push('', indirect);
    const tipText = tipLines.join('\n');

    card.addEventListener('mouseenter', (e) => showTooltip(e, tipText));
    card.addEventListener('mousemove', moveTooltip);
    card.addEventListener('mouseleave', hideTooltip);

    grid.appendChild(card);
  }

  document.getElementById('jobs-at-risk-count').textContent = atRisk;
  document.getElementById('jobs-lost-count').textContent = lost;
}

function renderDeficit() {
  const rev = calcTotalRevenue();
  const spend = calcTotalSpending();
  const gap = rev - spend;
  const change = gap - BASELINE_DEFICIT;

  const el = document.getElementById('deficit-number');
  el.textContent = (gap >= 0 ? '+' : '') + formatB(gap);
  el.className = 'deficit-number ' + (gap >= 0 ? 'surplus' : 'deficit');

  const changeEl = document.getElementById('deficit-change');
  if (change === 0) {
    changeEl.textContent = 'Baseline';
    changeEl.style.color = 'var(--muted)';
  } else {
    changeEl.textContent = (change > 0 ? '▲ improved ' : '▼ worsened ') + formatB(Math.abs(change));
    changeEl.style.color = change > 0 ? 'var(--green)' : 'var(--red)';
  }

  document.getElementById('d-rev').textContent = formatB(rev);
  document.getElementById('d-spend').textContent = formatB(spend);
  document.getElementById('d-gap').textContent = (gap >= 0 ? '+' : '') + formatB(gap);

  document.getElementById('rev-total-display').textContent = formatB(rev);
  document.getElementById('spend-total-display').textContent = formatB(spend);

  // Bar: show progress toward surplus, centered on on-budget baseline
  // Range: -2500B (worst) to +850B (best) = 3350B total span
  const barPct = Math.min(100, Math.max(0, ((gap + 2500) / 3350) * 100));
  const bar = document.getElementById('bar-fill');
  bar.style.width = barPct + '%';
  bar.style.background = gap >= 0 ? 'var(--green)' : gap > -455 ? 'var(--amber)' : 'var(--red)';
}

function updateAll() {
  renderDeficit();
  renderJobs();
  renderRevenue();  // Full re-render to update button states
  renderSpending(); // Full re-render to re-attach all event handlers
}

// Lightweight update: only refreshes displayed numbers, never re-renders DOM
function updateValues() {
  renderDeficit();
  renderJobs();

  const totalRev = calcTotalRevenue();
  for (const [key, r] of Object.entries(state.revenue)) {
    let multiplier = 1.0;
    if (r.type === 'progressive' && progressiveMultipliers[key]) multiplier = progressiveMultipliers[key];
    if (r.type === 'flat' && flatTaxMultipliers[key]) multiplier = flatTaxMultipliers[key];
    const amt = r.baseAmount * r.rateMultiplier * multiplier;
    const pct = ((amt / totalRev) * 100).toFixed(1);
    const amtEl = document.getElementById(`rev-amt-${key}`);
    const pctEl = document.getElementById(`rev-pct-${key}`);
    if (amtEl) amtEl.textContent = formatB(amt);
    if (pctEl) pctEl.textContent = pct + '%';
  }

  for (const cat of Object.values(state.spending)) {
    for (const [k, item] of Object.entries(cat.items)) {
      const amtEl = document.getElementById(`spend-amt-${k}`);
      const dEl = document.getElementById(`spend-delta-${k}`);
      if (amtEl) amtEl.textContent = formatB(item.amount);
      if (dEl) {
        const d = item.amount - item.baseline;
        dEl.textContent = d === 0 ? '—' : (d > 0 ? '+' : '') + formatB(d);
        dEl.className = 'spend-delta ' + (d > 0 ? 'delta-pos' : d < 0 ? 'delta-neg' : 'delta-zero');
      }
    }
  }
}

// ─── EVENT HANDLERS ───────────────────────────────────────────────────────────
function updateRevRate(key, val) {
  state.revenue[key].rateMultiplier = val;
  updateValues(); // lightweight — does NOT re-render sliders
}

function toggleRevType(key) {
  const r = state.revenue[key];
  r.type = r.type === 'flat' ? 'progressive' : 'flat';
  updateAll(); // full re-render needed to update button label/class
}

function toggleCG() {
  state.cgAsOrdinary = !state.cgAsOrdinary;
  // Adjust capital gains tax revenue based on toggle
  // Ordinary income rates are higher, so increase the revenue multiplier
  if (state.cgAsOrdinary) {
    state.revenue.capitalGainsTax.rateMultiplier = 1.5;
  } else {
    state.revenue.capitalGainsTax.rateMultiplier = 1.0;
  }
  updateAll();
}

function updateSpend(catKey, itemKey, pct) {
  state.spending[catKey].items[itemKey].amount = state.spending[catKey].items[itemKey].baseline * pct;
  updateValues(); // lightweight — does NOT re-render sliders
}

function resetAll() {
  for (const r of Object.values(state.revenue)) {
    r.rateMultiplier = 1.0;
    r.type = r.type; // keep type
  }
  // Reset revenue types
  state.revenue.individualIncomeTax.type = 'progressive';
  state.revenue.socialSecurity.type = 'flat';
  state.revenue.medicare.type = 'flat';
  state.revenue.corporateIncomeTax.type = 'flat';
  state.revenue.exciseTax.type = 'flat';
  state.revenue.estateGiftTax.type = 'progressive';
  state.revenue.customsTariffs.type = 'flat';
  state.revenue.otherRevenue.type = 'flat';
  state.revenue.capitalGainsTax.type = 'flat';
  state.cgAsOrdinary = false;

  for (const cat of Object.values(state.spending)) {
    for (const item of Object.values(cat.items)) {
      item.amount = item.baseline;
    }
  }
  renderRevenue();
  renderSpending();
  updateAll();
}

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
function showTooltip(e, text) {
  const t = document.getElementById('tooltip');
  t.textContent = text;
  t.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  const t = document.getElementById('tooltip');
  t.style.left = (e.clientX + 12) + 'px';
  t.style.top = (e.clientY - 10) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// Add tooltips to locked debt items
function addDebtTooltips() {
  document.querySelectorAll('.locked-row').forEach(row => {
    row.addEventListener('mouseenter', (e) => showTooltip(e, 'Interest on the national debt cannot be directly cut — it can only decrease by running a surplus over multiple years, reducing the total debt principal.'));
    row.addEventListener('mousemove', moveTooltip);
    row.addEventListener('mouseleave', hideTooltip);
  });
}

// ─── MODAL FUNCTIONS ──────────────────────────────────────────────────────────
function showModal(key, type) {
  const info = type === 'revenue' ? revenueInfo[key] : spendingInfo[key];
  if (!info) return;
  
  document.getElementById('modal-title').textContent = info.title;
  document.getElementById('modal-description').textContent = info.description;
  document.getElementById('modal-stakeholders').textContent = info.stakeholders.map(s => '• ' + s).join('\n');
  document.getElementById('info-modal').classList.add('visible');
}

function closeModal() {
  document.getElementById('info-modal').classList.remove('visible');
}

// Close modal on escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Close modal when clicking outside
document.getElementById('info-modal')?.addEventListener('click', (e) => {
  if (e.target.id === 'info-modal') closeModal();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderRevenue();
renderSpending();
updateAll();
addDebtTooltips();
</script>
</body>
</html>
